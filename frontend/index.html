<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AI Question Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-copy">
        <span class="eyebrow">Member Access</span>
        <h1>Sign in to continue</h1>
        <p>Please enter your work email and password to access the interview question dashboard.</p>
      </div>
      <form id="loginForm" class="login-form" novalidate>
        <label>
          Email address
          <input id="emailInput" type="email" placeholder="you@example.com" required />
        </label>
        <label>
          Password
          <input id="passwordInput" type="password" placeholder="Enter your password" required />
        </label>
        <p class="login-error" id="loginError"></p>
        <div class="login-actions">
          <button type="submit" class="primary-btn">Sign In</button>
        </div>
      </form>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
